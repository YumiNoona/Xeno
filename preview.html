<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Xeno — Universal 360° Tour</title>
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, minimal-ui" />
  <link rel="icon" type="image/x-icon" href="public/logo.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="public/logo-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="public/logo-16x16.png">
  <link rel="manifest" href="manifest.json"><!-- xeno-export-remove -->
  <script>
    if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js')}<!-- xeno-export-remove -->
    (function(){var t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t)})();
  </script>

  <!-- Font: JetBrains Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com"><!-- xeno-export-remove -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><!-- xeno-export-remove -->
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet"><!-- xeno-export-remove -->
  <link rel="stylesheet" href="css/tokens.css">
  <style>
    html,
    body,
    * {
      font-family: 'JetBrains Mono', 'Courier New', monospace !important;
    }
  </style>
  <link rel="stylesheet" href="css/lib/hint.css">
  <link rel="stylesheet" href="css/viewer/layout.css">
  <link rel="stylesheet" href="css/editor/buttons.css">
  <link rel="stylesheet" href="css/viewer/components-controls.css">
  <link rel="stylesheet" href="css/viewer/components-themes.css">
  <link rel="stylesheet" href="css/viewer/components-overlays.css">
  <link rel="stylesheet" href="css/hotspots/types-standard.css">
  <link rel="stylesheet" href="css/hotspots/types-content.css">
  <link rel="stylesheet" href="css/hotspots/animations.css">
  <link rel="stylesheet" href="css/hotspots/dots.css">
  <link rel="stylesheet" href="css/lib/minimap.css">
</head>

<body class="desktop no-touch">
  <script>
    (function(){
      var slug=new URLSearchParams(window.location.search).get('project'),theme='hamburger';
      if(slug){try{var r=localStorage.getItem('xeno_tour_'+slug);if(r){var p=JSON.parse(r);if(p&&p.data&&p.data.settings)theme=p.data.settings.layoutTheme||'hamburger'}}catch(e){}}
      document.body.setAttribute('data-layout-theme',theme);
    })();
  </script>

  <!-- Loading overlay -->
  <div id="xeno-loading">
    <style>
      #xeno-loading {
        position: fixed; inset: 0; z-index: 99999;
        background: var(--bg-base, #0a0a0a); display: flex;
        flex-direction: column; align-items: center; justify-content: center;
        gap: 16px; transition: opacity 0.3s ease;
        font-family: 'JetBrains Mono', monospace;
      }
      #xeno-loading.hide { opacity: 0; pointer-events: none; }
      #xeno-loading .loader-logo { font-size: 48px; font-weight: 700; color: var(--text-primary, #fff); letter-spacing: 0.04em; }
      #xeno-loading .loader-logo span { color: var(--accent, #e11d48); }
      #xeno-loading .loader-bar {
        width: 120px; height: 2px; background: var(--border, #262626); border-radius: 2px; overflow: hidden;
      }
      #xeno-loading .loader-bar div {
        height: 100%; width: 40%; background: var(--accent, #e11d48); border-radius: 2px;
        animation: loader-slide 1s ease-in-out infinite;
      }
      @keyframes loader-slide {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(350%); }
      }
    </style>
    <div class="loader-logo"><span>✦</span> XENO</div>
    <div class="loader-bar"><div></div></div>
  </div>

  <!-- Main Viewer -->
  <div id="pano"></div>

  <!-- Minimap -->
  <div id="xeno-minimap"></div>

  <!-- UI Overlays -->
  <div id="titleBar">
    <div class="sceneName">Loading...</div>
  </div>

  <div id="sceneList">
    <div class="scenes"></div>
  </div>

  <!-- Page transition overlay -->
  <div id="xeno-page-transition" style="position: fixed; inset: 0; background: var(--bg-base); z-index: 99998; opacity: 0; pointer-events: none; transition: opacity 0.2s ease;"></div>

  <div id="controls">

    <!-- Autorotate: cleaner rotate → pause icons -->
    <div id="autorotateToggle" class="ctrl-btn" title="Toggle Autorotate">
      <svg class="icon on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12a9 9 0 11-6.364-8.485"/>
        <polyline points="21 3 21 9 15 9"/>
      </svg>
      <svg class="icon off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <rect x="6" y="4" width="4" height="16"/>
        <rect x="14" y="4" width="4" height="16"/>
      </svg>
    </div>

    <!-- Fullscreen: simple expand/collapse -->
    <div id="fullscreenToggle" class="ctrl-btn" title="Toggle Fullscreen">
      <svg class="icon on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <polyline points="8 3 3 3 3 8"/>
        <polyline points="16 3 21 3 21 8"/>
        <polyline points="8 21 3 21 3 16"/>
        <polyline points="16 21 21 21 21 16"/>
      </svg>
      <svg class="icon off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <polyline points="4 14 10 14 10 20"/>
        <polyline points="20 10 14 10 14 4"/>
      </svg>
    </div>

    <!-- Scene List: simple list icon -->
    <div id="sceneListToggle" class="ctrl-btn" title="Toggle Scene List">
      <svg class="icon on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
      <svg class="icon off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
        <line x1="19" y1="5" x2="5" y2="19"/>
      </svg>
    </div>

    <!-- Gyroscope: simple motion sensor icon -->
    <div id="gyroToggle" class="ctrl-btn" title="Toggle Gyroscope">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <circle cx="12" cy="12" r="7" stroke-dasharray="4 4"/>
      </svg>
    </div>

    <!-- VR: simple headset icon -->
    <div id="vrToggle" class="ctrl-btn" title="Enter VR Mode">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round">
        <path d="M2 9a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2h-3l-2-4H9l-2 4H4a2 2 0 0 1-2-2V9z"/>
        <circle cx="7.5" cy="12" r="1.5"/>
        <circle cx="16.5" cy="12" r="1.5"/>
      </svg>
    </div>

    <!-- Minimap: simple map pin icon -->
    <div id="minimapToggle" class="ctrl-btn" title="Toggle Minimap">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round">
        <path d="M21 10c0 7-9 12-9 12s-9-5-9-12a9 9 0 0 1 18 0z"/>
        <circle cx="12" cy="10" r="3"/>
      </svg>
    </div>

    <!-- Pan Controls: 4 clear directional arrows for navigation -->
    <div id="viewControlsToggle" class="ctrl-btn" title="Toggle Pan Controls">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round">
        <!-- Up Arrow -->
        <polyline points="12 4 8 8 16 8"/>
        <!-- Down Arrow -->
        <polyline points="12 20 8 16 16 16"/>
        <!-- Left Arrow -->
        <polyline points="4 12 8 8 8 16"/>
        <!-- Right Arrow -->
        <polyline points="20 12 16 8 16 16"/>
      </svg>
    </div>

    <!-- Capture: simple camera icon -->
    <div id="captureToggle" class="ctrl-btn" title="Capture Screenshot">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round">
        <path d="M14.5 4h-5L7 7H4a2 2 0 00-2 2v9a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2h-3l-2.5-3z"/>
        <circle cx="12" cy="13" r="3"/>
      </svg>
    </div>

  </div>

  <!-- Directional pan controls -->
  <div id="viewControls">
    <div></div>
    <div id="viewUp" class="ctrl-btn" title="Up">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
        stroke-linejoin="round">
        <polyline points="18 15 12 9 6 15" />
      </svg>
    </div>
    <div></div>
    <div id="viewLeft" class="ctrl-btn" title="Left">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
        stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6" />
      </svg>
    </div>
    <div id="viewDown" class="ctrl-btn" title="Down">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
        stroke-linejoin="round">
        <polyline points="6 9 12 15 18 9" />
      </svg>
    </div>
    <div id="viewRight" class="ctrl-btn" title="Right">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"
        stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6" />
      </svg>
    </div>
  </div>

  <div id="transition-overlay"></div>

  <!-- Capture overlay -->
  <div id="capture-overlay" style="display:none;">
    <div class="capture-backdrop"></div>
    <div class="capture-container">
      <div class="capture-main">
        <div class="capture-image-wrap" data-ratio="full">
          <img class="capture-image" src="" alt="Capture">
        </div>
      </div>
      <div class="capture-sidebar">
        <div class="capture-sidebar-title">Aspect</div>
        <div class="ratio-options">
          <div class="ratio-option active" data-ratio="full"><span class="ratio-indicator"></span><span class="ratio-label">Full</span></div>
          <div class="ratio-option" data-ratio="1-1"><span class="ratio-indicator"></span><span class="ratio-label">1:1</span></div>
          <div class="ratio-option" data-ratio="4-3"><span class="ratio-indicator"></span><span class="ratio-label">4:3</span></div>
          <div class="ratio-option" data-ratio="3-2"><span class="ratio-indicator"></span><span class="ratio-label">3:2</span></div>
          <div class="ratio-option" data-ratio="16-9"><span class="ratio-indicator"></span><span class="ratio-label">16:9</span></div>
        </div>
        <div class="capture-actions">
          <button class="ctrl-btn" id="capture-download" title="Download">↓</button>
          <button class="ctrl-btn" id="capture-close" title="Close">✕</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Intro Screen (controlled by inline script — zero flash) -->
  <div id="intro-screen" style="display:none;">
    <div class="intro-content">
      <div class="intro-logo">✦ <span>Xeno</span></div>
      <h1 id="intro-title">Xeno Tour</h1>
      <p id="intro-desc"></p>
      <button class="btn" id="btn-start-tour">Enter Tour</button>
    </div>
  </div>
  <script>
  (function(){
    try {
      var slug = new URLSearchParams(window.location.search).get('project');
      if (slug) {
        var raw = localStorage.getItem('xeno_tour_' + slug);
        if (raw) {
          var d = JSON.parse(raw);
          var s = d && d.data && d.data.settings;
          if (s) {
            // Apply visibility settings immediately (before any rendering)
            if (s.showControls === false) {
              var ctrl = document.getElementById('controls');
              if (ctrl) ctrl.style.display = 'none';
            }
            if (s.gyroscopeEnabled === false) {
              var g = document.getElementById('gyroToggle');
              if (g) g.style.display = 'none';
            }
            if (s.vrEnabled === false) {
              var v = document.getElementById('vrToggle');
              if (v) v.style.display = 'none';
            }
            if (s.showCaptureButton === false) {
              var cap = document.getElementById('captureToggle');
              if (cap) cap.style.display = 'none';
            }
            if (s.showScenes === false) {
              var slt = document.getElementById('sceneListToggle');
              if (slt) slt.style.display = 'none';
              var sl = document.getElementById('sceneList');
              if (sl) { sl.style.display = 'none'; sl.classList.remove('enabled'); }
            }
            // Intro screen
            if (s.intro && s.intro.enabled) {
              var intro = s.intro;
              var titleEl = document.getElementById('intro-title');
              var descEl = document.getElementById('intro-desc');
              var btnEl = document.getElementById('btn-start-tour');
              if (titleEl) titleEl.textContent = intro.title || s.name || 'Xeno Tour';
              if (descEl) {
                descEl.textContent = intro.subtitle || '';
                descEl.style.display = intro.subtitle ? '' : 'none';
              }
              if (btnEl) btnEl.textContent = intro.buttonText || 'Enter Tour';
              var el = document.getElementById('intro-screen');
              if (el) el.style.display = '';
            }
          }
        }
      }
    } catch(e) {}
  })();
  </script>

  <!-- Dependencies -->
  <script src="js/lib/screenfull.js"></script>
  <script src="js/engine/xeno.js"></script>
  <script src="js/lib/webvr-polyfill.js"></script>

  <!-- Core Libraries -->
  <script>if (!window.isExported) { document.write('<script src="js/ui/Supabase.js"><\/script>'); }</script>
  <!-- Default/sample tour data for standalone exported tours; overwritten by Supabase in hosted/editor mode -->
  <script src="data.js"></script>

  <!-- Modules -->
  <script src="js/engine/transitions.js"></script>
  <script src="js/engine/VideoAsset.js"></script>
  <script src="js/engine/DeviceOrientation.js"></script>
  <script src="js/engine/colorEffects.js"></script>
  <script src="js/hotspots/HotspotFactory.js"></script>
  <script src="js/engine/homography.js"></script>
  <script src="js/hotspots/Builders-Nav.js"></script>
  <script src="js/hotspots/Builders-Content.js"></script>
  <script src="js/hotspots/Builders-Content-adv.js"></script>
  <script src="js/ui/Minimap.js"></script>
  <script src="js/ui/SceneList.js"></script>

  <!-- VR Engine — must load before viewer.js -->
  <script src="js/vr/XenoVR.js"></script>

  <!-- Viewer Core -->
  <script src="js/viewer.js"></script>
  <!-- Viewer Modules -->
  <script src="js/viewer-theme.js"></script>
  <script src="js/viewer-gaze.js"></script>
  <script src="js/viewer-capture.js"></script>
  <script src="js/viewer-media.js"></script>
  <script src="js/viewer-startup.js"></script>


  
</body>

</html>
