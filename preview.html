<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Xeno — Universal 360° Tour</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, minimal-ui" />
  <link rel="icon" type="image/x-icon" href="img/logo.ico">
  
  <!-- Font: Roboto Mono -->  
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/hint.css">
  <link rel="stylesheet" href="css/viewer.css">
  <link rel="stylesheet" href="css/hotspots.css">
  <link rel="stylesheet" href="css/minimap.css">
</head>
<body class="desktop no-touch">

  <!-- Main Viewer -->
  <div id="pano"></div>

  <!-- Secondary Flat Viewer (Floorplan) -->
  <div id="xeno-minimap"></div>

  <!-- UI Overlays -->
  <div id="titleBar">
    <h1 class="sceneName">Loading...</h1>
  </div>

  <div id="sceneList">
    <div class="scenes"></div>
  </div>

  <div id="controls">
    <div id="autorotateToggle" class="ctrl-btn" title="Toggle Autorotate">
      <!-- SVG icons handled in JS or CSS -->
      <svg class="icon on" viewBox="0 0 24 24"><path d="M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M12,20A8,8 0 0,1 4,12A8,8 0 0,1 12,4A8,8 0 0,1 20,12A8,8 0 0,1 12,20M13,7H11V14L16.25,17.15L17,15.92L13,13.56V7Z"/></svg>
      <svg class="icon off" viewBox="0 0 24 24"><path d="M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M12,20A8,8 0 0,1 4,12A8,8 0 0,1 12,4A8,8 0 0,1 20,12A8,8 0 0,1 12,20M12,7A5,5 0 0,0 7,12A5,5 0 0,0 12,17A5,5 0 0,0 17,12A5,5 0 0,0 12,7Z"/></svg>
    </div>
    <div id="fullscreenToggle" class="ctrl-btn" title="Toggle Fullscreen">
      <svg class="icon on" viewBox="0 0 24 24"><path d="M5,5H10V7H7V10H5V5M14,5H19V10H17V7H14V5M17,14H19V19H14V17H17V14M10,17V19H5V14H7V17H10Z"/></svg>
      <svg class="icon off" viewBox="0 0 24 24"><path d="M14,14H19V16H16V19H14V14M5,14H10V19H8V16H5V14M8,5H10V10H5V8H8V5M19,8V10H14V5H16V8H19Z"/></svg>
    </div>
    <div id="sceneListToggle" class="ctrl-btn" title="Toggle Scene List">
      <svg class="icon on" viewBox="0 0 24 24"><path d="M3,6H21V8H3V6M3,11H21V13H3V11M3,16H21V18H3V16Z"/></svg>
      <svg class="icon off" viewBox="0 0 24 24"><path d="M3,6H21V8H3V6M3,11H21V13H3V11M3,16H21V18H3V16Z"/></svg>
    </div>
    <div id="gyroToggle" class="ctrl-btn" title="Toggle Gyroscope">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m12 12 3-3"/><path d="m12 12-3 3"/><path d="m12 12 3 3"/><path d="m12 12-3-3"/><circle cx="12" cy="12" r="2"/></svg>
    </div>
    <div id="vrToggle" class="ctrl-btn" title="Enter VR Mode">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="7" cy="12" r="2"/><circle cx="17" cy="12" r="2"/><path d="M12 12h.01"/></svg>
    </div>
    <div id="minimapToggle" class="ctrl-btn" title="Toggle Minimap">
      <svg class="icon" viewBox="0 0 24 24"><path d="M12,2L4,5V19L12,22L20,19V5M12,4.38L18,6.63V17.38L12,19.63V4.38Z"/></svg>
    </div>
    <div id="viewModeToggle" class="ctrl-btn" title="Change View Mode">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
    </div>
    <div id="viewControlsToggle" class="ctrl-btn" title="Toggle Move Controls">
      <svg class="icon" viewBox="0 0 24 24">
        <path d="M12 2L8 6h3v5H6V8L2 12l4 4v-3h5v5H8l4 4 4-4h-3v-5h5v3l4-4-4-4v3h-5V6h3L12 2z"/>
      </svg>
    </div>
  </div>

  <div id="viewControls">
    <div></div>
    <div id="viewUp" class="ctrl-btn" title="Up">↑</div>
    <div></div>
    <div id="viewLeft" class="ctrl-btn" title="Left">←</div>
    <div id="viewDown" class="ctrl-btn" title="Down">↓</div>
    <div id="viewRight" class="ctrl-btn" title="Right">→</div>
  </div>

  <!-- Branding Logo Removed -->
  <div id="transition-overlay"></div>

  <!-- Intro Screen -->
  <div id="intro-screen">
    <div class="intro-content">
      <h1 id="intro-title">Xeno Tour</h1>
      <p id="intro-desc">Welcome to the interactive 360 experience.</p>
      <button id="btn-start-tour">Start Tour</button>
    </div>
  </div>

  <!-- Marzipano & Dependencies -->
  <script src="js/vendor/screenfull.js"></script>
  <script src="js/vendor/bowser.js"></script>
  
  <script src="config.js"></script>
  <script src="js/core/xeno.js"></script>
  <script src="js/vendor/webvr-polyfill.js"></script>

  <!-- Core Libraries -->
  <script src="js/ui/Supabase.js"></script>
  <script src="data.js"></script>

  <!-- Modules (To be built next sessions) -->
  <script src="js/core/transitions.js"></script>
  <script src="js/core/VideoAsset.js"></script>
  <script src="js/core/DeviceOrientation.js"></script>
  <script src="js/core/colorEffects.js"></script>
  <script src="js/hotspots/HotspotFactory.js"></script>
  <script src="js/ui/Minimap.js"></script>
  <script src="js/ui/SceneList.js"></script>

  <!-- App Entry -->
  <script src="js/viewer.js"></script>

  <!-- Global UI Menus -->
  <div id="viewModeMenu" class="view-mode-menu">
    <div class="view-mode-item" data-mode="normal">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
      <span>Normal</span>
    </div>
    <div class="view-mode-item" data-mode="mirror-ball">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>
      <span>Mirror Ball</span>
    </div>
    <div class="view-mode-item" data-mode="little-planet">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17.5 19a3.5 3.5 0 1 1-7 0 3.5 3.5 0 0 1 7 0Z"/><path d="M12.5 8.5h.01"/><path d="M16 12h.01"/><path d="M11 12h.01"/><path d="M15 15h.01"/><path d="M2 12a10 10 0 1 0 13-9.54"/></svg>
      <span>Little Planet</span>
    </div>
  </div>

</body>
</html>
