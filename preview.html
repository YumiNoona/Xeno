<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Xeno — Universal 360° Tour</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, minimal-ui" />
  <link rel="icon" type="image/x-icon" href="img/logo.ico">
  
  <!-- Font: Roboto Mono -->  
  <!-- Font loading: preconnect first, then direct link for fastest render -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/tokens.css">
  <style>html, body, * { font-family: 'Roboto Mono', 'Courier New', monospace !important; }</style>
  <link rel="stylesheet" href="css/hint.css">
  <link rel="stylesheet" href="css/viewer.css">
  <link rel="stylesheet" href="css/hotspots.css">
  <link rel="stylesheet" href="css/minimap.css">
</head>
<body class="desktop no-touch">

  <!-- Main Viewer -->
  <div id="pano"></div>

  <!-- Secondary Flat Viewer (Floorplan) -->
  <div id="xeno-minimap"></div>

  <!-- UI Overlays -->
  <div id="titleBar">
    <h1 class="sceneName">Loading...</h1>
  </div>

  <div id="sceneList">
    <div class="scenes"></div>
  </div>

  <div id="controls">

    <!-- Autorotate: spinning orbit icon (on) vs static pause circle (off) -->
    <div id="autorotateToggle" class="ctrl-btn" title="Toggle Autorotate">
      <svg class="icon on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <!-- on = autorotating: circular arrows -->
        <polyline points="23 4 23 10 17 10"/>
        <polyline points="1 20 1 14 7 14"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
      <svg class="icon off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <!-- off = paused: pause icon -->
        <circle cx="12" cy="12" r="10"/>
        <line x1="10" y1="15" x2="10" y2="9"/>
        <line x1="14" y1="15" x2="14" y2="9"/>
      </svg>
    </div>

    <!-- Fullscreen: expand corners (on) vs compress corners (off) -->
    <div id="fullscreenToggle" class="ctrl-btn" title="Toggle Fullscreen">
      <svg class="icon on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <!-- on = enter fullscreen: expand arrows -->
        <polyline points="15 3 21 3 21 9"/>
        <polyline points="9 21 3 21 3 15"/>
        <line x1="21" y1="3" x2="14" y2="10"/>
        <line x1="3" y1="21" x2="10" y2="14"/>
      </svg>
      <svg class="icon off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <!-- off = exit fullscreen: compress arrows -->
        <polyline points="4 14 10 14 10 20"/>
        <polyline points="20 10 14 10 14 4"/>
        <line x1="10" y1="14" x2="3" y2="21"/>
        <line x1="21" y1="3" x2="14" y2="10"/>
      </svg>
    </div>

    <!-- Scene List: layers stack icon (on) vs single layer (off) -->
    <div id="sceneListToggle" class="ctrl-btn" title="Toggle Scene List">
      <svg class="icon on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <!-- on = list visible: three rows -->
        <line x1="8" y1="6" x2="21" y2="6"/>
        <line x1="8" y1="12" x2="21" y2="12"/>
        <line x1="8" y1="18" x2="21" y2="18"/>
        <line x1="3" y1="6" x2="3.01" y2="6"/>
        <line x1="3" y1="12" x2="3.01" y2="12"/>
        <line x1="3" y1="18" x2="3.01" y2="18"/>
      </svg>
      <svg class="icon off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <!-- off = list hidden: slashed rows -->
        <line x1="8" y1="6" x2="21" y2="6"/>
        <line x1="8" y1="12" x2="21" y2="12"/>
        <line x1="8" y1="18" x2="21" y2="18"/>
        <line x1="3" y1="6" x2="3.01" y2="6"/>
        <line x1="3" y1="12" x2="3.01" y2="12"/>
        <line x1="3" y1="18" x2="3.01" y2="18"/>
        <line x1="1" y1="1" x2="23" y2="23" stroke-opacity="0.5"/>
      </svg>
    </div>

    <!-- Gyroscope: phone with motion arcs — unique compass-rose style -->
    <div id="gyroToggle" class="ctrl-btn" title="Toggle Gyroscope">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="7" y="2" width="10" height="20" rx="2"/>
        <path d="M4 7c-1.5 1.5-2 3-2 5s.5 3.5 2 5"/>
        <path d="M20 7c1.5 1.5 2 3 2 5s-.5 3.5-2 5"/>
        <circle cx="12" cy="12" r="2" fill="currentColor" stroke="none"/>
      </svg>
    </div>

    <!-- VR: stereoscopic goggles — distinct visor shape -->
    <div id="vrToggle" class="ctrl-btn" title="Enter VR Mode">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 8a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v7c0 .6-.4 1.1-1 1.3L18 18h-3l-1.5-2h-3L9 18H6l-3-1.7c-.6-.2-1-.7-1-1.3V8z"/>
        <circle cx="8" cy="12" r="2"/>
        <circle cx="16" cy="12" r="2"/>
      </svg>
    </div>

    <!-- Minimap: map with location pin — distinct from grid -->
    <div id="minimapToggle" class="ctrl-btn" title="Toggle Minimap">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/>
        <line x1="8" y1="2" x2="8" y2="18"/>
        <line x1="16" y1="6" x2="16" y2="22"/>
      </svg>
    </div>

    <!-- View Mode: eye with sparkle — distinct lens/projection feel -->
    <div id="viewModeToggle" class="ctrl-btn" title="Change View Mode">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
        <circle cx="12" cy="12" r="3"/>
        <line x1="20" y1="4" x2="22" y2="2"/>
        <line x1="19" y1="2" x2="21" y2="4"/>
      </svg>
    </div>

    <!-- Pan Controls: four directional arrows in crosshair — unique from move hotspot -->
    <div id="viewControlsToggle" class="ctrl-btn" title="Toggle Pan Controls">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="1" fill="currentColor" stroke="none"/>
        <polyline points="12 2 10 5 12 8 14 5 12 2"/>
        <polyline points="22 12 19 10 16 12 19 14 22 12"/>
        <polyline points="12 22 14 19 12 16 10 19 12 22"/>
        <polyline points="2 12 5 14 8 12 5 10 2 12"/>
      </svg>
    </div>

  </div>

  <div id="viewControls">
    <div></div>
    <div id="viewUp" class="ctrl-btn" title="Up">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="18 15 12 9 6 15"/>
      </svg>
    </div>
    <div></div>
    <div id="viewLeft" class="ctrl-btn" title="Left">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </div>
    <div id="viewDown" class="ctrl-btn" title="Down">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </div>
    <div id="viewRight" class="ctrl-btn" title="Right">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </div>
  </div>

  <!-- Branding Logo Removed -->
  <div id="transition-overlay"></div>

  <!-- Intro Screen -->
  <div id="intro-screen">
    <div class="intro-content">
      <h1 id="intro-title">Xeno Tour</h1>
      <p id="intro-desc">Welcome to the interactive 360 experience.</p>
      <button id="btn-start-tour">Start Tour</button>
    </div>
  </div>

  <!-- Marzipano & Dependencies -->
  <script src="js/vendor/screenfull.js"></script>
  <script src="js/vendor/bowser.js"></script>
  
  <script src="config.js"></script>
  <script src="js/core/xeno.js"></script>
  <script src="js/vendor/webvr-polyfill.js"></script>

  <!-- Core Libraries -->
  <script src="js/ui/Supabase.js"></script>
  <script src="data.js"></script>

  <!-- Modules (To be built next sessions) -->
  <script src="js/core/transitions.js"></script>
  <script src="js/core/VideoAsset.js"></script>
  <script src="js/core/DeviceOrientation.js"></script>
  <script src="js/core/colorEffects.js"></script>
  <script src="js/hotspots/HotspotFactory.js"></script>
  <script src="js/ui/Minimap.js"></script>
  <script src="js/ui/SceneList.js"></script>

  <!-- App Entry -->
  <script src="js/viewer.js"></script>

  <!-- Global UI Menus -->
  <div id="viewModeMenu" class="view-mode-menu">

    <!-- Normal: standard equirectangular / eye view -->
    <div class="view-mode-item" data-mode="normal">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 2a15 15 0 0 1 0 20"/>
        <path d="M12 2a15 15 0 0 0 0 20"/>
        <path d="M2 12h20"/>
        <path d="M2 7h20M2 17h20" stroke-opacity="0.4"/>
      </svg>
      <span>Normal</span>
    </div>

    <!-- Mirror Ball: sphere looking up — wide fisheye upward pitch -->
    <div class="view-mode-item" data-mode="mirror-ball">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9"/>
        <!-- Disco grid lines — horizontal -->
        <path d="M3.5 9h17M3.5 12h17M3.5 15h17"/>
        <!-- Vertical curves -->
        <path d="M12 3c2 2 3 5 3 9s-1 7-3 9"/>
        <path d="M12 3c-2 2-3 5-3 9s1 7 3 9"/>
        <!-- Sparkle dots -->
        <circle cx="8" cy="8" r="0.8" fill="currentColor" stroke="none"/>
        <circle cx="16" cy="7" r="0.8" fill="currentColor" stroke="none"/>
        <circle cx="17" cy="15" r="0.8" fill="currentColor" stroke="none"/>
      </svg>
      <span>Mirror Ball</span>
    </div>

    <!-- Little Planet: small sphere sitting on wide landscape, looking down -->
    <div class="view-mode-item" data-mode="little-planet">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <!-- Planet body -->
        <circle cx="12" cy="15" r="5"/>
        <!-- Orbit ring around it -->
        <ellipse cx="12" cy="15" rx="9" ry="3" stroke-opacity="0.45"/>
        <!-- Sky / space above -->
        <path d="M5 8 Q12 4 19 8" stroke-opacity="0.4"/>
        <!-- Stars -->
        <circle cx="7" cy="5" r="0.7" fill="currentColor" stroke="none"/>
        <circle cx="17" cy="4" r="0.7" fill="currentColor" stroke="none"/>
        <circle cx="12" cy="3" r="0.5" fill="currentColor" stroke="none"/>
      </svg>
      <span>Little Planet</span>
    </div>

  </div>

</body>
</html>
