<!DOCTYPE html>
<html>
<head>
  <title>Xeno — 360° Tour Platform</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* dark, clean, minimal */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d0d12; color: #c0c0d4; font-family: 'Inter', sans-serif;
           min-height: 100vh; display: flex; flex-direction: column;
           align-items: center; justify-content: center; gap: 40px; padding: 40px; }
    .logo { font-size: 32px; font-weight: 600; color: #fff; }
    .logo span { color: #006fff; }
    .subtitle { font-size: 15px; color: #606075; text-align: center; max-width: 400px; }
    .cards { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
    .card { background: #12121a; border: 0.5px solid #222230; border-radius: 12px;
            padding: 24px 28px; width: 220px; cursor: pointer;
            transition: border-color 0.15s, transform 0.15s; text-decoration: none; color: inherit; }
    .card:hover { border-color: #006fff44; transform: translateY(-2px); }
    .card i { font-size: 28px; color: #006fff; margin-bottom: 12px; display: block; font-style: normal; font-weight: bold; }
    .card h3 { font-size: 14px; font-weight: 500; color: #e0e0f0; margin-bottom: 4px; }
    .card p { font-size: 12px; color: #505065; }
    
    /* Glowing background accents */
    .accent {
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(0, 111, 255, 0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: -1;
    }
    .accent-1 { top: 10%; left: 10%; }
    .accent-2 { bottom: 10%; right: 10%; }
  </style>
</head>
<body>
  <div class="accent accent-1"></div>
  <div class="accent accent-2"></div>

  <div class="logo">✦ <span>Xeno</span></div>
  <p class="subtitle">Build and share immersive 360° virtual tours</p>
  <div class="cards">
    <a href="editor.html" class="card">
      <i>✎</i>
      <h3>Open Editor</h3>
      <p>Create and manage your 360° tours</p>
    </a>

    <a href="https://www.marzipano.net/demos/sample-tour/" target="_blank" class="card">
      <i>★</i>
      <h3>Marzipano Tour</h3>
      <p>External demo of a sample Marzipano tour</p>
    </a>
    <a href="https://www.marzipano.net/demos/hotspot-styles/" target="_blank" class="card">
      <i>✦</i>
      <h3>Hotspot Styles</h3>
      <p>External demo showing various hotspot styles</p>
    </a>
  </div>
</body>
</html>
