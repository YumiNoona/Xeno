<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Xeno — 360° Tour Platform</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="img/logo.ico">
  <!-- Font loading: preconnect first, then direct link for fastest render -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/tokens.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg-base);
      color: var(--text-secondary);
      font-family: var(--font-family-base);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
      padding: 40px;
      -webkit-font-smoothing: antialiased;
      transition: background 0.3s, color 0.3s;
    }

    /* Subtle warm grain texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.4;
      z-index: 0;
    }

    .hero { text-align: center; position: relative; z-index: 1; }
    .logo {
      font-size: var(--type-4xl);
      font-weight: var(--weight-bold);
      color: var(--text-primary);
      letter-spacing: -0.04em;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .logo span { color: var(--accent); }
    .tagline {
      font-size: var(--type-md);
      color: var(--text-muted);
      letter-spacing: 0.02em;
    }

    .theme-toggle {
      position: fixed;
      top: 24px;
      right: 24px;
      width: 40px;
      height: 40px;
      border-radius: var(--radius-full);
      background: var(--bg-raised);
      border: 1px solid var(--border);
      color: var(--text-primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: all 0.2s;
    }
    .theme-toggle:hover {
      background: var(--bg-hover);
      transform: scale(1.1);
    }
    .theme-toggle:active {
      transform: scale(0.9);
    }

    .cards {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      position: relative;
      z-index: 1;
      max-width: 800px;
    }
    .card {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 32px 24px;
      width: 240px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 16px;
      box-shadow: var(--shadow);
    }
    .card:hover {
      border-color: var(--accent);
      transform: translateY(-8px);
      box-shadow: var(--shadow-xl), 0 0 20px var(--accent-dim);
    }
    .card-icon {
      width: 48px; height: 48px;
      background: var(--accent-dim);
      border: 1px solid var(--accent-glow);
      border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      font-size: var(--type-2xl);
      color: var(--accent);
      transition: all 0.3s;
    }
    .card:hover .card-icon {
      transform: scale(1.1) rotate(5deg);
      background: var(--accent);
      color: #fff;
    }
    .card h3 {
      font-size: var(--type-lg);
      font-weight: var(--weight-bold);
      color: var(--text-primary);
    }
    .card p { font-size: var(--type-sm); color: var(--text-muted); line-height: 1.6; }

    .footer {
      position: relative; z-index: 1;
      font-size: var(--type-xs);
      color: var(--text-disabled);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <button class="theme-toggle" id="theme-toggle" title="Toggle Theme">
    <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>

  <div class="hero">
    <div class="logo">✦ <span>Xeno</span></div>
    <p class="tagline">Build and share immersive 360° virtual tours</p>
  </div>

  <div class="cards">
    <a href="editor.html" class="card">
      <div class="card-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      </div>
      <h3>Open Editor</h3>
      <p>Create and manage your 360° tours with powerful tools</p>
    </a>
    <a href="preview.html" class="card">
      <div class="card-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      </div>
      <h3>Preview Tour</h3>
      <p>Experience your current project in full immersion</p>
    </a>
    <a href="https://www.marzipano.net/demos/sample-tour/" target="_blank" class="card">
      <div class="card-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      </div>
      <h3>Explore Demo</h3>
      <p>See what's possible with the Marzipano engine</p>
    </a>
  </div>

  <div class="footer">Made With Love by Veil ❤ Xeno Tour</div>

  <script>
    const themeToggle = document.getElementById('theme-toggle');
    const sunIcon = document.getElementById('sun-icon');
    const moonIcon = document.getElementById('moon-icon');
    
    // Check for saved theme preference
    const currentTheme = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', currentTheme);
    updateIcons(currentTheme);

    themeToggle.addEventListener('click', () => {
      const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
      updateIcons(theme);
    });

    function updateIcons(theme) {
      if (theme === 'dark') {
        sunIcon.style.display = 'none';
        moonIcon.style.display = 'block';
      } else {
        sunIcon.style.display = 'block';
        moonIcon.style.display = 'none';
      }
    }
  </script>
</body>

</html>
