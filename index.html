<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Xeno — 360° Tour Platform</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0e0c0c;
      color: #a09898;
      font-family: 'DM Sans', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
      padding: 40px;
      -webkit-font-smoothing: antialiased;
    }

    /* Subtle warm grain texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.4;
      z-index: 0;
    }

    .hero { text-align: center; position: relative; z-index: 1; }
    .logo {
      font-size: 36px;
      font-weight: 700;
      color: #f0eded;
      letter-spacing: -0.02em;
      margin-bottom: 10px;
    }
    .logo span { color: #e62e5a; }
    .tagline {
      font-size: 14px;
      color: #5a5050;
      letter-spacing: 0.04em;
    }

    .cards {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
      position: relative;
      z-index: 1;
    }
    .card {
      background: #161313;
      border: 1px solid #2c2626;
      border-radius: 16px;
      padding: 24px;
      width: 210px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .card:hover {
      border-color: rgba(230,46,90,0.4);
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(230,46,90,0.1);
    }
    .card-icon {
      width: 40px; height: 40px;
      background: rgba(230,46,90,0.1);
      border: 1px solid rgba(230,46,90,0.2);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 14px;
      font-size: 20px;
      color: #e62e5a;
    }
    .card h3 {
      font-size: 14px;
      font-weight: 600;
      color: #f0eded;
      margin-bottom: 5px;
    }
    .card p { font-size: 12px; color: #5a5050; line-height: 1.5; }

    .footer {
      position: relative; z-index: 1;
      font-size: 11px;
      color: #3a3030;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="logo">✦ <span>Xeno</span></div>
    <p class="tagline">Build and share immersive 360° virtual tours</p>
  </div>

  <div class="cards">
    <a href="editor.html" class="card">
      <div class="card-icon">✎</div>
      <h3>Open Editor</h3>
      <p>Create and manage your 360° tours</p>
    </a>
    <a href="preview.html" class="card">
      <div class="card-icon">▶</div>
      <h3>Preview Tour</h3>
      <p>View your current tour in fullscreen</p>
    </a>
    <a href="https://www.marzipano.net/demos/sample-tour/" target="_blank" class="card">
      <div class="card-icon">✦</div>
      <h3>Demo Tour</h3>
      <p>Sample Marzipano tour</p>
    </a>
  </div>

  <div class="footer">Powered by Marzipano · Xeno Tour Studio</div>
</body>
</html>
