<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <!-- Font: Roboto Mono — clean, technical, distinctive -->
  <!-- NO external icon CDN — all icons are inline SVG via JS helpers -->

  <!-- Font loading: preconnect first, then direct link for fastest render -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/tokens.css">
  <!-- Editor CSS — split by feature -->
  <link rel="stylesheet" href="css/editor/base.css">
  <link rel="stylesheet" href="css/editor/buttons.css">
  <link rel="stylesheet" href="css/editor/topbar.css">
  <link rel="stylesheet" href="css/editor/sidebar.css">
  <link rel="stylesheet" href="css/editor/viewport.css">
  <link rel="stylesheet" href="css/editor/panels.css">
  <link rel="stylesheet" href="css/editor/menus.css">
  <link rel="stylesheet" href="css/editor/media.css">
  <link rel="stylesheet" href="css/editor/dashboard.css">
  <link rel="stylesheet" href="css/editor/theme.css">
  <!-- Critical: inline font lock — fires before external CSS, kills Times New Roman -->
  <style>
    html, body, * { font-family: 'Roboto Mono', 'Courier New', monospace !important; }
  </style>
  <!-- Viewer CSS — split -->
  <link rel="stylesheet" href="css/viewer/layout.css">
  <link rel="stylesheet" href="css/viewer/components.css">
  <!-- Hotspots CSS — split -->
  <link rel="stylesheet" href="css/hotspots/types.css">
  <link rel="stylesheet" href="css/hotspots/animations.css">
  <link rel="stylesheet" href="css/hotspots/dots.css">
  <!-- Inline SVG icon system — zero CDN dependency -->
  <script>
    // xIcon(name) returns an SVG string for a Tabler-style icon
    // All icons are 24x24 viewBox, stroke-based
    const XICONS = {
      // navigation / UI
      'chevron-left': '<path d="m15 18-6-6 6-6"/>',
      'chevron-right': '<path d="m9 18 6-6-6-6"/>',
      'plus': '<path d="M12 5v14m-7-7h14"/>',
      'x': '<path d="M18 6 6 18M6 6l12 12"/>',
      'search': '<circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>',
      'folder': '<path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>',
      'camera': '<path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/>',
      'eye': '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>',
      'eye-off': '<path d="M9.88 9.88a3 3 0 1 0 4.24 4.24M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19M1 1l22 22M6.71 6.71A10.47 10.47 0 0 0 1 13s4 8 11 8a10.3 10.3 0 0 0 4.31-1"/>',
      'map': '<path d="M14.12 3.88 16 2l3 3-1.88 1.88"/><path d="M14.12 3.88c-1.1-1.1-2.9-1.1-4 0l-7 7a2.83 2.83 0 0 0 0 4l7 7c1.1 1.1 2.9 1.1 4 0l7-7a2.83 2.83 0 0 0 0-4l-7-7Z"/><path d="m2.5 9.5 7.5 7.5"/><path d="m9.5 2.5 7.5 7.5"/>',
      'settings': '<path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/>',
      'rotate-cw': '<path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.85.83 6.72 2.24"/><path d="M21 3v9h-9"/>',
      'cursor': '<path d="m4 4 7.07 17 2.51-7.39L21 11.07z"/>',
      'sun': '<circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>',
      'moon': '<path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>',
      // hotspot types
      'arrow-right': '<path d="M5 12h14m-7-7 7 7-7 7"/>',
      'info': '<circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/>',
      'link': '<path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>',
      'photo': '<rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/>',
      'video': '<path d="m22 8-6 4 6 4V8Z"/><rect width="14" height="12" x="2" y="6" rx="2" ry="2"/>',
      'volume': '<path d="M11 5 6 9H2v6h4l5 4V5Z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>',
      'trash': '<path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2m-6 5v6m4-6v6"/>',
      'edit': '<path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/>',
      'copy': '<rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>',
      'star': '<path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>',
      'download': '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="m7 10 5 5 5-5"/><path d="M12 15V3"/>',
      'move': '<path d="m5 9-3 3 3 3M9 5l3-3 3 3M15 19l-3 3-3-3M19 9l3 3-3 3M2 12h20M12 2v20"/>',
      'check': '<path d="M20 6 9 17l-5-5"/>',
    };
    function xIcon(name, size) {
      const s = size || 16;
      const paths = XICONS[name] || '';
      return `<svg xmlns="http://www.w3.org/2000/svg" width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">${paths}</svg>`;
    }

    // Modern replacement for document.write icon injection
    class XenoIcon extends HTMLElement {
      connectedCallback() {
        const name = this.getAttribute('name');
        const size = this.getAttribute('size') || 16;
        this.innerHTML = xIcon(name, size);
      }
    }
    customElements.define('x-icon', XenoIcon);
  </script>
</head>

<body>

  <!-- ══ Partial: Dashboard ═══════════════════════════════ -->
  <script src="partials/dashboard.js"></script>

  <!-- ══ Workspace ══════════════════════════════════════════ -->
  <div id="workspace-view" style="display:none;">

    <!-- ══ Partial: Topbar ══════════════════════════════════ -->
    <script src="partials/workspace-topbar.js"></script>

    <div id="editor-main">

      <!-- Left Sidebar -->
      <div id="editor-sidebar">
        <div class="sidebar-header">
          <span class="sidebar-label">Scenes</span>
          <button class="add-item-btn" id="btn-add-scene">
            <x-icon name="plus" size="14"></x-icon>
            Add Scene
          </button>
          <div id="scene-multi-toolbar" style="display: none;">
            <span id="scene-sel-count">0 selected</span>
            <button id="btn-delete-scenes" class="btn btn-danger">
              <x-icon name="trash" size="14"></x-icon>
              Delete
            </button>
            <button id="btn-clear-scene-sel" class="btn btn-secondary">
              <x-icon name="x" size="14"></x-icon>
            </button>
          </div>
        </div>
        <div id="scene-grid"></div>
      </div>
      <div class="collapse-btn" id="sidebar-collapse-btn">
        <x-icon name="chevron-left" size="14"></x-icon>
      </div>
      <div class="resizer left-resizer" id="left-resizer"></div>

      <!-- ══ Partial: Viewport ══════════════════════════════ -->
      <script src="partials/viewport.js"></script>

      <!-- ══ Partial: Properties Panel ══════════════════════ -->
      <script src="partials/properties-panel.js"></script>

    </div>
  </div>

  <!-- ══ Partial: Context Menus & Move Modal ══════════════ -->
  <script src="partials/context-menus.js"></script>

  <!-- ══ Partial: Media Manager Modal ═════════════════════ -->
  <script src="partials/media-modal.js"></script>

  <!-- Scripts -->
  <script src="config.js"></script>
  <script src="js/core/xeno.js"></script>
  <script src="data.js"></script>
  <script src="js/core/transitions.js"></script>
  <script src="js/core/VideoAsset.js"></script>
  <script src="js/core/DeviceOrientation.js"></script>
  <script src="js/core/colorEffects.js"></script>
  <script src="js/core/homography.js"></script>
  <!-- HotspotFactory — split into core + builders -->
  <script src="js/hotspots/HotspotFactory.js"></script>
  <script src="js/hotspots/Builders-Nav.js"></script>
  <script src="js/hotspots/Builders-Content.js"></script>
  <script src="js/ui/Minimap.js"></script>
  <script src="js/ui/Supabase.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <!-- Editor modules -->
  <script src="js/editor/state.js"></script>
  <script src="js/editor/tools.js"></script>
  <script src="js/editor/hotspot-manager.js"></script>
  <script src="js/editor/hotspot-props-panel.js"></script>
  <script src="js/editor/hotspot-props-types.js"></script>
  <script src="js/editor/scene-manager.js"></script>
  <script src="js/editor/scene-settings.js"></script>
  <script src="js/editor/media-manager.js"></script>
  <script src="js/editor/dashboard.js"></script>
  <script src="js/editor/export.js"></script>
  <script src="js/editor/ui.js"></script>
  <script src="js/editor.js"></script>
</body>

</html>
