    // xIcon(name) returns an SVG string for a Tabler-style icon

      'eye': '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>',
      'eye-off': '<path d="M9.88 9.88a3 3 0 1 0 4.24 4.24M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19M1 1l22 22M6.71 6.71A10.47 10.47 0 0 0 1 13s4 8 11 8a10.3 10.3 0 0 0 4.31-1"/>',
      'viewfinder': '<circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3"/><path d="M12 3v2M12 19v2M3 12h2M19 12h2"/>',
      'repeat': '<path d="m17 2 4 4-4 4"/><path d="M3 11v-1a4 4 0 0 1 4-4h14"/><path d="m7 22-4-4 4-4"/><path d="M21 13v1a4 4 0 0 1-4 4H3"/>',
      'map': '<path d="M14.12 3.88 16 2l3 3-1.88 1.88"/><path d="M14.12 3.88c-1.1-1.1-2.9-1.1-4 0l-7 7a2.83 2.83 0 0 0 0 4l7 7c1.1 1.1 2.9 1.1 4 0l7-7a2.83 2.83 0 0 0 0-4l-7-7Z"/><path d="m2.5 9.5 7.5 7.5"/><path d="m9.5 2.5 7.5 7.5"/>',
      'settings': '<path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/>',
      'rotate-cw': '<path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.85.83 6.72 2.24"/><path d="M21 3v9h-9"/>',
      'cursor': '<path d="m4 4 7.07 17 2.51-7.39L21 11.07z"/>',
      'sun': '<circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>',
      'moon': '<path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>',
      // hotspot types — consistent outline, no rings/circles
      'arrow-right': '<path d="M5 12h14m-7-7 7 7-7 7"/>',
      'info': '<path d="M12 20v-4"/><path d="M12 8h.01"/><path d="M12 3a9 9 0 1 0 0 18 9 9 0 0 0 0-18z"/>',
      'link': '<path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>',
      'photo': '<rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/>',
      'video': '<path d="m22 8-6 4 6 4V8Z"/><rect width="14" height="12" x="2" y="6" rx="2" ry="2"/>',
      'volume': '<path d="M11 5 6 9H2v6h4l5 4V5Z"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>',
      'trash': '<path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2m-6 5v6m4-6v6"/>',
      'edit': '<path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/>',
      'copy': '<rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>',
      'star': '<path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>',
      'download': '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="m7 10 5 5 5-5"/><path d="M12 15V3"/>',
      'move': '<path d="m5 9-3 3 3 3M9 5l3-3 3 3M15 19l-3 3-3-3M19 9l3 3-3 3M2 12h20M12 2v20"/>',
      'type': '<polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/>',
      'upload': '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>',
      'narrator': '<path d="M8 9h3m-3 4h6"/><path d="M10 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/><path d="M5 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h1"/><path d="M19 7h1a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2h-1"/>',
      'speaker': '<path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>',
      'soundwave': '<path d="M2 12h2m2-4v8m2-6v4m2-8v12m2-6v4m2-4v8"/>',
      'check': '<path d="M20 6 9 17l-5-5"/>',
    };
    function xIcon(name, size) {
      const s = size || 16;
      const paths = XICONS[name] || '';
      return `<svg xmlns="http://www.w3.org/2000/svg" width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">${paths}</svg>`;
    }

    // Modern replacement for document.write icon injection
    class XenoIcon extends HTMLElement {
      connectedCallback() {
        const name = this.getAttribute('name');
        const size = this.getAttribute('size') || 16;
        this.innerHTML = xIcon(name, size);
      }
    }
    customElements.define('x-icon', XenoIcon);
  </script>

<body>

  <!-- Donate modal -->
  <style>
    .dnt-overlay { display:none; position:fixed; inset:0; background:var(--overlay); z-index:10000; align-items:center; justify-content:center; backdrop-filter:blur(var(--overlay-blur)); }
    .dnt-modal { background:var(--bg-panel); border:3px solid var(--border); max-width:480px; width:90%; padding:0; }
    .dnt-header { display:flex; justify-content:center; align-items:center; padding:18px 22px; border-bottom:2px solid var(--border); position:relative; }
    .dnt-header h3 { text-transform:uppercase; letter-spacing:0.06em; margin:0; color:var(--text-primary); font-size:var(--type-lg); }
    .dnt-header button { position:absolute; right:18px; background:none; border:none; color:var(--text-muted); font-size:22px; cursor:pointer; padding:0; line-height:1; }
    .dnt-body { padding:28px 22px; text-align:center; }
    .dnt-desc { font-size:var(--type-sm); color:var(--text-secondary); margin-bottom:20px; line-height:1.6; }
    .dnt-qr-img { width:180px; height:180px; border:2px solid var(--border); margin-bottom:8px; }
    .dnt-qr-label { font-size:var(--type-xs); color:var(--text-muted); text-transform:uppercase; letter-spacing:0.08em; display:block; margin-bottom:18px; }
    .dnt-upi { background:var(--bg-raised); border:2px solid var(--border); padding:14px; margin-bottom:16px; }
    .dnt-upi-label { font-size:var(--type-2xs); color:var(--text-muted); text-transform:uppercase; letter-spacing:0.08em; display:block; margin-bottom:6px; }
    .dnt-upi-row { display:flex; align-items:center; gap:8px; }
    .dnt-upi-id { font-family:var(--font-mono); font-size:var(--type-sm); color:var(--accent); flex:1; word-break:break-all; }
    .dnt-copy { background:var(--bg-base); border:2px solid var(--border); color:var(--text-muted); cursor:pointer; padding:4px 6px; display:flex; align-items:center; flex-shrink:0; }
    .dnt-copy:hover { border-color:var(--accent); color:var(--accent); }
    .dnt-thanks { font-size:var(--type-2xs); color:var(--text-muted); margin-bottom:16px; }
    .dnt-byline { font-size:var(--type-2xs); color:var(--text-disabled); text-transform:uppercase; letter-spacing:0.1em; padding-top:12px; border-top:1px solid var(--border); }
    .dnt-skip { display:flex; align-items:center; justify-content:center; gap:6px; margin-top:14px; cursor:pointer; font-size:var(--type-2xs); color:var(--text-muted); }
    .dnt-skip input { accent-color:var(--accent); }
  </style>
  <div class="dnt-overlay" id="dnt-overlay">
    <div class="dnt-modal">
      <div class="dnt-header"><h3>Support Xeno</h3><button id="dnt-close">&times;</button></div>
      <div class="dnt-body">
        <p class="dnt-desc">If you like our service, please consider donating to keep these tools free forever.</p>
        <img src="public/Donate.jpeg" alt="QR Code" class="dnt-qr-img">
        <span class="dnt-qr-label">Veily UPI QR Code</span>
        <div class="dnt-upi">
          <span class="dnt-upi-label">Direct UPI Payment</span>
          <div class="dnt-upi-row">
            <code class="dnt-upi-id">rushikeshingale2001@okicici</code>
            <button class="dnt-copy" id="dnt-copy" title="Copy">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </button>
          </div>
        </div>
        <p class="dnt-thanks">Every donation, no matter how small, helps cover hosting and AI API costs.</p>
        <p class="dnt-byline">Built with 💙 Made by Veil</p>
        <label class="dnt-skip"><input type="checkbox" id="dnt-skip-today"> Don't show again today</label>
      </div>
    </div>
  </div>
  <script>
    window.showDonatePopup = function(force) {
      var today = new Date().toDateString();
      if (!force && localStorage.getItem('dnt_skip_date') === today) return;
      var overlay = document.getElementById('dnt-overlay');
      var close = document.getElementById('dnt-close');
      overlay.style.display = 'flex';
      close.onclick = function() { overlay.style.display = 'none'; };
      overlay.onclick = function(e) { if (e.target === overlay) overlay.style.display = 'none'; };
      document.getElementById('dnt-skip-today').onchange = function() {
        if (this.checked) localStorage.setItem('dnt_skip_date', today);
        else localStorage.removeItem('dnt_skip_date');
      };
      var copyBtn = document.getElementById('dnt-copy');
      if (copyBtn) {
        copyBtn.onclick = function() {
          navigator.clipboard.writeText('rushikeshingale2001@okicici').then(function() {
            copyBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>';
            setTimeout(function() { copyBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>'; }, 1500);
          }).catch(function(){});
        };
      }
    };
  </script>
